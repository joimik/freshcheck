[build]
  command = "npm --prefix client install && npm --prefix client run build"
  publish = "client/dist"

# SPA routing — every non-asset request returns index.html so React Router works.
[[redirects]]
  from = "/*"
  to   = "/index.html"
  status = 200

# The service worker must never be cached aggressively, otherwise users get
# stuck on an old version forever.
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Content-Type = "application/javascript"

[[headers]]
  for = "/manifest.webmanifest"
  [headers.values]
    Content-Type = "application/manifest+json"
